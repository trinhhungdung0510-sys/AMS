# AMS Docker stack — sau khi up, chạy frontend: npm run dev:up (hoặc bash scripts/up.sh)
services:
  postgres:
    image: postgres:16-alpine
    container_name: ams-postgres
    environment:
      POSTGRES_DB: ams
      POSTGRES_USER: ams
      POSTGRES_PASSWORD: ams_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams -d ams"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ams-net

  redis:
    image: redis:7-alpine
    container_name: ams-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ams-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://ams:ams_password@postgres:5432/ams
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - backend_uploads:/app/uploads
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ams-net

  ams-vision:
    build:
      context: ../ams-vision
    container_name: ams-vision
    environment:
      BACKEND_BASE_URL: http://backend:8000
      CAMERA_ID: CAM-001
      MOCK_DETECTION: "true"
      MOCK_DETECTION_INTERVAL: "30"
      PUBLISH_CATEGORY: restricted_zone_intrusion
      SNAPSHOTS_DIR: /app/snapshots
    ports:
      - "8010:8010"
    volumes:
      - vision_snapshots:/app/snapshots
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ams-net

networks:
  ams-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  vision_snapshots:
  backend_uploads:
  backend_storage:
